apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cloudops-ai-backend
  namespace: default
spec:
  template:
    spec:
      containers:
      - image: us-central1-docker.pkg.dev/PROJECT_ID/cloudops-ai/backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: GOOGLE_CLOUD_PROJECT
          value: "PROJECT_ID"
        - name: FIRESTORE_COLLECTION
          value: "incidents"
        - name: AI_SERVICE_URL
          value: "https://AI_SERVICE_URL"
        - name: PUBSUB_TOPIC
          value: "incident-events"
        - name: PORT
          value: "3001"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 30
      timeoutSeconds: 3600
      serviceAccountName: cloudops-ai-app
